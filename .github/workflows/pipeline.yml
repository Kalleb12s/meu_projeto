name: Meu Pipeline

on: [push]

jobs:
  rodar-python:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Rodar script
        run: python app.py